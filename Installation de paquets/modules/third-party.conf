# Configuration pour les logiciels tiers non disponibles dans les dépôts Fedora
MODULE_NAME="Third Party Software"

# Commande d'installation par défaut (utilisée si pas de commande personnalisée)
INSTALL_CMD="dnf install -y"

# Prérequis pour les installations tierces
PREREQS="wget curl gnupg2"

# Liste des logiciels tiers à installer
PACKAGES="

# Brave Browser
brave-browser|curl -fsS https://brave-browser-apt-release.s3.brave.com/brave-core.asc | gpg --dearmor -o /usr/share/keyrings/brave-browser-keyring.gpg && echo 'deb [signed-by=/usr/share/keyrings/brave-browser-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main' > /etc/apt/sources.list.d/brave-browser-release.list && dnf update && dnf install -y brave-browser

# Vivaldi Browser
vivaldi-browser|wget -qO- https://repo.vivaldi.com/archive/linux_signing_key.pub | gpg --dearmor -o /usr/share/keyrings/vivaldi-keyring.gpg && echo 'deb [signed-by=/usr/share/keyrings/vivaldi-keyring.gpg] https://repo.vivaldi.com/archive/stable multiverse main' > /etc/yum.repos.d/vivaldi.repo && dnf update && dnf install -y vivaldi-stable

# Visual Studio Code (version officielle Microsoft)
vscode-microsoft|rpm --import https://packages.microsoft.com/keys/microsoft.asc && echo '[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc' > /etc/yum.repos.d/vscode.repo && dnf update && dnf install -y code

# OpenRGB
openrgb|wget https://gitlab.com/CalcProgrammer1/OpenRGB/-/releases/v0.9/downloads/openrgb_0.9_amd64.rpm -O /tmp/openrgb.rpm && dnf localinstall -y /tmp/openrgb.rpm && rm /tmp/openrgb.rpm

# Warp Terminal
warp-terminal|wget https://releases.warp.dev/stable/v0.2024.10.29.08.02.stable_00/linux/warp-terminal.rpm -O /tmp/warp-terminal.rpm && dnf localinstall -y /tmp/warp-terminal.rpm && rm /tmp/warp-terminal.rpm

# Discord (si non déjà installé via RPM Fusion)
discord-direct|wget https://discord.com/api/download?platform=linux&format=tar.gz -O /tmp/discord.tar.gz && cd /tmp && tar -xzf discord.tar.gz && mv Discord /opt/ && ln -sf /opt/Discord/Discord /usr/local/bin/discord && rm discord.tar.gz

# Notion
notion|wget https://www.notion.so/desktop/linux/download -O /tmp/notion.rpm && dnf localinstall -y /tmp/notion.rpm && rm /tmp/notion.rpm

"
