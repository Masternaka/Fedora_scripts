# Configuration pour les logiciels tiers non disponibles dans les dépôts Fedora
MODULE_NAME="Third Party Software"

# Commande d'installation par défaut (utilisée si pas de commande personnalisée)
INSTALL_CMD="dnf install -y"

# Prérequis pour les installations tierces
PREREQS="
wget
curl
gnupg2
dnf-plugins-core
"

# Liste des logiciels tiers à installer
# Format commande personnalisée: NOM|COMMANDE
PACKAGES="

# Brave Browser (dépôt RPM officiel Brave)
brave-browser|dnf config-manager --add-repo https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo && rpm --import https://brave-browser-rpm-release.s3.brave.com/brave-core.asc && dnf install -y brave-browser

# Vivaldi Browser (dépôt RPM officiel Vivaldi)
vivaldi-browser|printf '[vivaldi]\nname=Vivaldi packages for Linux\nbaseurl=https://repo.vivaldi.com/archive/rpm/x86_64\nenabled=1\ngpgcheck=1\ngpgkey=https://repo.vivaldi.com/archive/linux_signing_key.pub\n' > /etc/yum.repos.d/vivaldi.repo && dnf install -y vivaldi-stable

# Visual Studio Code (dépôt RPM officiel Microsoft)
vscode-microsoft|rpm --import https://packages.microsoft.com/keys/microsoft.asc && printf '[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc\n' > /etc/yum.repos.d/vscode.repo && dnf install -y code

# OpenRGB (via COPR - plus fiable que le RPM direct)
openrgb|dnf copr enable -y ianhattendorf/openrgb && dnf install -y openrgb

# Warp Terminal (dernière version stable via l'URL officielle)
warp-terminal|WARP_RPM=$(curl -fsSL https://releases.warp.dev/stable/latest/linux/warp-terminal-latest.rpm -o /tmp/warp-terminal.rpm 2>/dev/null && echo /tmp/warp-terminal.rpm) && dnf localinstall -y /tmp/warp-terminal.rpm && rm -f /tmp/warp-terminal.rpm

# Discord (archive tar.gz officielle)
discord-direct|wget "https://discord.com/api/download?platform=linux&format=tar.gz" -O /tmp/discord.tar.gz && tar -xzf /tmp/discord.tar.gz -C /tmp && mv /tmp/Discord /opt/ && ln -sf /opt/Discord/Discord /usr/local/bin/discord && rm -f /tmp/discord.tar.gz

"



