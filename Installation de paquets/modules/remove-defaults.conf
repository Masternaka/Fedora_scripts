# Configuration pour supprimer les paquets par défaut de Fedora 44 KDE
MODULE_NAME="Remove Default KDE Packages"

# Commande de désinstallation
# --noautoremove : évite de supprimer des dépendances partagées par d'autres paquets
INSTALL_CMD="dnf remove -y --noautoremove"

# Prérequis (aucun pour la désinstallation)
PREREQS=""

# Liste des paquets à désinstaller (applications KDE par défaut non désirées)
# Les commentaires sont maintenant sûrs grâce au parsing ligne par ligne dans install.sh
PACKAGES="

# Applications multimédias par défaut
kdenlive
k3b
dragon
okular

# Suite PIM KDE (mail, agenda, contacts)
kmail
korganizer
kaddressbook
akregator
knotes

# Jeux par défaut
kpatience
kmahjongg
kmines

# Outils réseau/bureau à distance KDE
kde-connect
krfb
krdc

# Applications utilitaires par défaut
konversation
kate

# Outils de développement KDE
kdevelop
qtcreator

"
