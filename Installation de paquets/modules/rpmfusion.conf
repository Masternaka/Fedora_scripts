# Configuration des paquets RPM Fusion
MODULE_NAME="RPM Fusion Packages"

# Commande d'installation pour les paquets RPM Fusion
INSTALL_CMD="dnf install -y"

# Prérequis: activation des dépôts RPM Fusion
# La version Fedora est détectée automatiquement via $(rpm -E %fedora)
PREREQS="
https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm
https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
"

# Liste des paquets à installer depuis RPM Fusion
# Exemples: ffmpeg vlc libdvdcss gstreamer1-plugins-bad-free-extras
PACKAGES="

"
